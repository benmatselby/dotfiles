# https://github.com/dlvhdr/gh-dash/blob/main/.gh-dash.yml
prSections:
  - title: My projects
    filters: is:open user:@me
  - title: My Pull Requests
    filters: is:open author:@me
  - title: Needs My Review
    filters: is:open -is:draft -label:no-slay-alert review-requested:@me
  - title: Approved not merged
    filters: is:open review:approved reviewed-by:@me
  - title: Involved
    filters: is:open -is:draft involves:@me -author:@me
  - title: Team deployments
    filters: is:pr is:merged closed:2026-06-15..2026-06-20 org:prolific-oss slay in:title

issuesSections:
  - title: My Issues
    filters: is:open author:@me
  - title: Assigned
    filters: is:open assignee:@me
  - title: Involved
    filters: is:open involves:@me -author:@me

notificationsSections:
  - title: Created
    filters: "reason:author"
  - title: Review Requested
    filters: "reason:review-requested"
  - title: Participating
    filters: "reason:participating"
  - title: Subscribed
    filters: "reason:subscribed"
  - title: All
    filters: "not:done"

defaults:
  preview:
    open: true
    width: 75
  prsLimit: 50
  issuesLimit: 50
  notificationsLimit: 50
  view: prs
  refetchIntervalMinutes: 10

keybindings:
  prs:
    - key: T
      command: gh enhance -R {{.RepoName}} {{.PrNumber}}
  notifications:
    - key: d
      builtin: markAsDone
    - key: D
      builtin: markAllAsDone
